name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            build-essential \
            libffi-dev libssl-dev \
            python3-dev

      - name: Install Buildozer ONLY
        run: |
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer

      - name: Force clean everything
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK (NO SDK TOUCH)
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExamSystem-APK
          path: bin/*.apk